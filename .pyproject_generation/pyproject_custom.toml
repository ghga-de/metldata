[project]
name = "metldata"
version = "4.0.5"
description = "metldata - A framework for handling metadata based on ETL, CQRS, and event sourcing."
dependencies = [
    "hexkit[akafka,mongodb] >=8.1, <9",
    "ghga-service-commons[api,auth] >=7.0, <8",
    "ghga-event-schemas ~= 11.1.1",
    "typer >= 0.21",
    "linkml == 1.6.1",
    "linkml-runtime == 1.6.0",
    "linkml-validator == 0.4.5",
    "cryptography >= 46.0.4",
    "pydantic >= 2.12.5"
]

[project.urls]
Repository = "https://github.com/ghga-de/metldata"

[project.scripts]
metldata = "metldata.__main__:run"
