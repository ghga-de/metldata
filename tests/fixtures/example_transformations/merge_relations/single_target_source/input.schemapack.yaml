schemapack: 4.2.0
classes:
  Dataset:
    id:
      propertyName: alias
    content: ../../../example_content_schemas/Dataset.schema.json
    relations:
      # single target (multiple.target: false) -> stored as a bare id string
      primary_sample:
        targetClass: Sample
        multiple:
          origin: true
          target: false
        mandatory:
          origin: false
          target: true
      # multiple targets (multiple.target: true) -> stored as a set of ids
      extra_samples:
        targetClass: Sample
        multiple:
          origin: true
          target: true
        mandatory:
          origin: false
          target: false
  Sample:
    id:
      propertyName: alias
    content: ../../../example_content_schemas/Sample.schema.json
